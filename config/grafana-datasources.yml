apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    url: http://tempo:3200
    jsonData:
      tracesToLogs:
        datasourceUid: loki
      serviceMap:
        datasourceUid: prometheus
  - name: Loki
    type: loki
    url: http://loki:3100
    isDefault: false

  - name: Prometheus
    type: prometheus
    url: http://prometheus:9090    # Port interne du conteneur Prometheus
    isDefault: true
    jsonData:
      timeInterval: "15s"